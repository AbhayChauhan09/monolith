version: '3'

services:

  app:
    build: ./app
    container_name: php-app
    volumes:
      - ./app:/var/www/html
    expose:
      - 9000
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always
